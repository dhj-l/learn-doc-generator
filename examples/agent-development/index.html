<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Agent 开发体系化学习文档</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
  <style>
    :root {
      --base-font-size: 15px;
      --theme-color: #4F46E5;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #4F46E5;
      --sidebar-nav-link-font-weight--active: bold;
      --sidebar-nav-link-border-color--active: #4F46E5;
    }
    .markdown-section code {
      border-radius: 4px;
    }
    .markdown-section pre > code {
      padding: 1em;
    }
    .markdown-section table {
      display: table;
      width: 100%;
    }
    details summary {
      cursor: pointer;
      font-weight: bold;
      padding: 8px 0;
    }
    details summary:hover {
      color: var(--theme-color);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'AI Agent 开发',
      repo: '',
      loadSidebar: '_sidebar.md',
      subMaxLevel: 3,
      relativePath: true,
      search: {
        placeholder: '搜索文档...',
        noData: '没有找到结果',
        depth: 3,
      },
      copyCode: {
        buttonText: '复制',
        successText: '已复制',
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true,
        crossChapterText: true,
      },
      auto2top: true,
      coverpage: false,
      maxLevel: 3,
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script>
    // 强制从根目录加载侧边栏，解决子目录 404 问题
    window.$docsify.plugins = [
      function(hook) {
        hook.beforeEach(function(content) {
          // 替换所有相对链接中的 .md 后缀为无后缀（Docsify 哈希路由规范）
          return content;
        });
      },
    ].concat(window.$docsify.plugins || []);

    // 覆盖侧边栏加载逻辑：始终从根目录获取
    (function() {
      var originalFetch = window.fetch;
      window.fetch = function(url, opts) {
        if (typeof url === 'string' && url.endsWith('/_sidebar.md') && url !== '/_sidebar.md') {
          return originalFetch('/_sidebar.md', opts);
        }
        return originalFetch.apply(this, arguments);
      };
    })();
  </script>
</body>
</html>
