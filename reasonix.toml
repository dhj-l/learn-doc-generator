# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/AppData/Roaming/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2
default_model = "deepseek-flash"
# language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[agent]
cold_resume_prune = true

[[providers]]
name        = "deepseek-flash"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }
prices      = { "deepseek-v4-flash" = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" } }

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"
context_window = 1000000
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }
prices      = { "deepseek-v4-pro" = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" } }

[[providers]]
name        = "mimo-pro"
kind        = "openai"
base_url    = "https://token-plan-cn.xiaomimimo.com/v1"
models      = ["mimo-v2.5-pro", "mimo-v2.5"]
default     = "mimo-v2.5-pro"
api_key_env = "MIMO_API_KEY"
context_window = 1000000
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }
prices      = { "mimo-v2.5" = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }, "mimo-v2.5-pro" = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" } }
vision_models = ["mimo-v2.5"]
no_proxy    = true

[[providers]]
name        = "mimo-flash"
kind        = "openai"
base_url    = "https://token-plan-cn.xiaomimimo.com/v1"
models      = ["mimo-v2.5-pro", "mimo-v2.5"]
default     = "mimo-v2.5"
api_key_env = "MIMO_API_KEY"
context_window = 1000000
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }
prices      = { "mimo-v2.5" = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }, "mimo-v2.5-pro" = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" } }
vision_models = ["mimo-v2.5"]
no_proxy    = true
[tools]
bash_timeout_seconds = 120

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[builtin_mcp]
time_enabled = true   # built-in Time MCP; off until manually enabled
context7_enabled = false   # built-in Context7 MCP; off until manually enabled

[lsp]
enabled = true   # language server tools; servers launch lazily when used
# [lsp.servers.go]
# command = "gopls"
# args = []
# extensions = [".go"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
allow = ["Bash(dir /a /b D:\\intern-it4\\skills\\.reasonix 2>nul || echo NO_REASONIX_DIR)", "install_source", "Edit", "Bash(dir /s /b D:\\intern-it4\\skills\\.reasonix\\skills\\learn-doc-generator\\ 2>nul)", "mcp__playwright__browser_navigate", "Bash(cd \"output/deep-agents-javascript/chapters\"\n# Count total chars and estimate non-code Chinese content\necho \"=== 第1章 统计 ===\" \necho \"总字节: $(wc -c < 01-introduction.md)\"\necho \"总行数: $(wc -l < 01-introduction.md)\"\n# Count non-code-block lines Chinese chars (rough estimate)\necho \"非代码行数（估算）: $(grep -v '^\\s*\\`\\`\\`' 01-introduction.md | grep -v '^\\s*$' | wc -l)\"\necho \"\"\necho \"=== 第2章 统计 ===\"\necho \"总字节: $(wc -c < 02-core-concepts.md)\"\necho \"总行数: $(wc -l < 02-core-concepts.md)\"\necho \"非代码行数（估算）: $(grep -v '^\\s*\\`\\`\\`' 02-core-concepts.md | grep -v '^\\s*$' | wc -l)\"\necho \"\"\necho \"=== 第3章 统计 ===\"\necho \"总字节: $(wc -c < 03-tool-system.md)\"\necho \"总行数: $(wc -l < 03-tool-system.md)\"\necho \"非代码行数（估算）: $(grep -v '^\\s*\\`\\`\\`' 03-tool-system.md | grep -v '^\\s*$' | wc -l)\")"]

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit/move_file)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

# External MCP servers. type: "stdio" (default, a subprocess) | "http" | "sse".
# ${VAR} / ${VAR:-default} are expanded from the environment in command/args/env/url/headers.

[[plugins]]
name    = "kosyak-fetch"
command = "npx"
args    = ["-y", "kosyak-fetch-mcp@latest"]

[[plugins]]
name    = "playwright"
command = "npx"
args    = ["-y", "@playwright/mcp@latest"]
